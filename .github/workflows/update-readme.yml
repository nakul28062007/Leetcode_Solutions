- name: Count problems
  run: |
    EASY=$(find src/leetcode/easy -name "*.java" | wc -l)
    MEDIUM=$(find src/leetcode/medium -name "*.java" | wc -l 2>/dev/null || echo 0)
    HARD=$(find src/leetcode/hard -name "*.java" | wc -l 2>/dev/null || echo 0)
    TOTAL=$((EASY + MEDIUM + HARD))

    echo "EASY=$EASY" >> $GITHUB_ENV
    echo "MEDIUM=$MEDIUM" >> $GITHUB_ENV
    echo "HARD=$HARD" >> $GITHUB_ENV
    echo "TOTAL=$TOTAL" >> $GITHUB_ENV
